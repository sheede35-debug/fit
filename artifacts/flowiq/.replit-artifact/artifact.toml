kind = "web"
previewPath = "/"
title = "FlowIQ"
version = "1.0.0"
id = "artifacts/flowiq"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20839

[services.development]
run = "pnpm --filter @workspace/flowiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowiq", "run", "build" ]
serve = "static"
publicDir = "artifacts/flowiq/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20839"
BASE_PATH = "/"
